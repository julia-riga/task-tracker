<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Home Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="window">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Home Tasks" class="app-logo">
            <h2 id="appTitle">Home Tasks</h2>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" data-filter="all">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                <span id="navAll">All Tasks</span>
            </div>
            <div class="nav-item" data-filter="active">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span id="navActive">Active</span>
            </div>
            <div class="nav-item" data-filter="completed">
                <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span id="navCompleted">Completed</span>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="data-btn theme" id="themeBtn">🌙 <span id="themeStatus">Light</span></button>
            <button class="data-btn notifications" id="notifBtn">🔔 <span id="notifStatus">Off</span></button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">
        <header class="header">
            <div class="header-title">
                <h1 id="mainTitle">Task Manager</h1>
                <p id="subtitle" class="subtitle">Organize your home tasks by category, set deadlines and track progress</p>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
                <button class="data-btn lang" id="langBtn">🌐 <span id="langStatus">EN</span></button>
                <button class="data-btn categories" id="categoriesBtn"><svg class="icon-inline" viewBox="0 0 24 24" width="16" height="16"><rect x="3" y="3" width="7" height="7" fill="currentColor"/><rect x="14" y="3" width="7" height="7" fill="currentColor"/><rect x="3" y="14" width="7" height="7" fill="currentColor"/><rect x="14" y="14" width="7" height="7" fill="currentColor"/></svg> <span id="categoriesBtnText">Categories</span></button>
                <button class="data-btn export" id="exportBtn">📥 <span id="exportBtnText">Export</span></button>
                <button class="data-btn import" id="importBtn">📤 <span id="importBtnText">Import</span></button>
                <input type="file" id="importFileInput" accept=".json" style="display:none">
            </div>
        </header>

        <!-- WIDGETS -->
        <div class="widgets-grid">
            <div class="widget chart-widget">
                <div class="widget-header"><h3 id="weeklyProgressTitle">📈 Weekly Progress</h3></div>
                <div class="chart-bars" id="chartBars"></div>
                <div class="chart-summary" id="chartSummary"></div>
            </div>
            <div class="widget stats-widget">
                <div class="stat-item"><div class="stat-icon">📊</div><div class="stat-info"><div class="stat-value" id="totalTasks">0</div><div class="stat-label" id="statTotalLabel">Total</div></div></div>
                <div class="stat-item"><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-value" id="completedTasks">0</div><div class="stat-label" id="statCompletedLabel">Completed</div></div></div>
                <div class="stat-item"><div class="stat-icon">⏳</div><div class="stat-info"><div class="stat-value" id="activeTasks">0</div><div class="stat-label" id="statActiveLabel">Active</div></div></div>
                <div class="stat-item"><div class="stat-icon">⚠️</div><div class="stat-info"><div class="stat-value" id="overdueTasks">0</div><div class="stat-label" id="statOverdueLabel">Overdue</div></div></div>
            </div>
            <div class="widget calendar-widget">
                <div class="widget-header"><h3 id="calendarTitle"><svg class="icon-inline" viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="9" y1="2" x2="9" y2="6" stroke="currentColor" stroke-width="2"/><line x1="15" y1="2" x2="15" y2="6" stroke="currentColor" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></svg> <span id="calendarTitleText">Calendar</span></h3></div>
                <div id="calendarContainer"></div>
            </div>
        </div>

        <!-- ADD TASK FORM -->
        <div class="add-task-container">
            <div class="add-task">
                <input type="text" id="taskInput" placeholder="What needs to be done?">
                <input type="date" id="deadlineInput">
                <select id="categoryInput"><option value="">📌 Category</option></select>
                <button id="addBtn" class="add-btn">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span id="addBtnText">Add Task</span>
                </button>
            </div>
        </div>

        <!-- FILTERS AND SORT -->
        <div class="filter-sort-bar">
            <div class="category-filters" id="categoryFilters"></div>
            <div class="sort-controls">
                <span id="sortLabel" class="sort-label">Sort by:</span>
                <select id="sortSelect" class="sort-select">
                    <option value="status-date" id="sortStatusDate">Status & Date</option>
                    <option value="deadline" id="sortDeadline">Deadline</option>
                    <option value="category" id="sortCategory">Category</option>
                    <option value="created" id="sortCreated">Created Date</option>
                    <option value="alpha" id="sortAlpha">Alphabetical</option>
                </select>
            </div>
        </div>

        <!-- TASK LIST -->
        <ul class="task-list" id="taskList"></ul>

        <!-- STATS PANEL -->
        <div class="stats-panel" id="statsPanel"></div>
    </main>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal">
        <div class="modal-header"><h2 id="modalTitle">🏷️ Category Management</h2><button class="modal-close" id="modalCloseBtn">×</button></div>
        <div id="categoryList"></div>
        <div class="emoji-picker-section">
            <div class="emoji-picker-title" id="emojiPickerTitle">🎨 Choose emoji for category:</div>
            <div class="emoji-categories" id="emojiCategories"></div>
            <div class="emoji-grid" id="emojiGrid"></div>
            <div class="emoji-preview" id="emojiPreview" style="display:none">
                <span class="emoji-preview-icon" id="previewIcon">📌</span>
                <span id="selectedText">Selected: <span id="previewEmoji">📌</span></span>
            </div>
            <input type="hidden" id="newCategoryEmoji">
        </div>
        <div class="add-category-form">
            <input type="text" id="newCategoryName" placeholder="Category name">
            <input type="color" id="newCategoryColor" value="#e67e22">
            <button id="addCategoryBtn">➕ <span id="addCategoryBtnText">Add</span></button>
        </div>
        <div class="modal-footer"><button class="reset-btn" id="resetCategoriesBtn">🔄 <span id="resetBtnText">Reset to Defaults</span></button></div>
    </div>
</div>

<div class="notification" id="notification"></div>

<script src="script.js"></script>
</body>
</html>
